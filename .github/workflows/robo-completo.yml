name: Robô Completo (Odds + Surebets)

on:
  schedule:
    - cron: '0 */2 * * *'  # Roda a cada 2 horas
  workflow_dispatch:  # Permite rodar manualmente

jobs:
  executar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Instalar dependências
        run: npm install
        
      - name: 🔍 PASSO 1 - Capturar TODAS as odds
        run: node src/robo.js
        
      - name: 📊 PASSO 2 - Calcular Surebets
        run: node calcular-surebet-inteligente.js
        
      - name: 💾 PASSO 3 - Salvar resultados
        uses: actions/upload-artifact@v4
        with:
          name: resultados-$(date +'%Y-%m-%d_%H-%M')
          path: |
            ./dados/
            ./surebet_*.json
